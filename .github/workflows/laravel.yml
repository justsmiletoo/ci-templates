name: Laravel CI/CD

on:
  workflow_call:
    inputs:
      php-image:
        description: "PHP image name (e.g. sididev-php)"
        required: true
        type: string
      nginx-image:
        description: "Nginx image name (e.g. sididev-nginx)"
        required: true
        type: string
      php-version:
        description: "PHP version"
        default: "8.3"
        type: string
      node-version:
        description: "Node.js version"
        default: "20"
        type: string
      has-node:
        description: "Project uses Node.js (Inertia/Vite)"
        default: false
        type: boolean
      main-branch:
        description: "Main branch name"
        default: "master"
        type: string
      staging-branch:
        description: "Staging branch name (e.g. re7). Leave empty for solo stage"
        default: ""
        type: string
      release-type:
        description: "Release type for release-please (php, node, etc.)"
        default: "php"
        type: string
      test-runner:
        description: "Test runner command"
        default: "vendor/bin/pest"
        type: string
    secrets:
      VPS_HOST:
        required: false
      VPS_USERNAME:
        required: false
      VPS_SSH_KEY:
        required: false
      VPS_PORT:
        required: false
      DEPLOY_PATH:
        required: false
      ENV_FILE_BASE64:
        required: false

jobs:
  # ── Checks ─────────────────────────────────────────────
  security:
    name: Security Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Check vulnerabilities
        run: composer audit --locked

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Setup Node
        if: ${{ inputs.has-node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install PHP dependencies
        run: composer install --no-scripts --prefer-dist

      - name: Install Node dependencies
        if: ${{ inputs.has-node }}
        run: npm ci

      - name: Check PHP formatting
        run: vendor/bin/pint --test

      - name: Check frontend formatting
        if: ${{ inputs.has-node }}
        run: npm run format:check || true

      - name: Lint frontend
        if: ${{ inputs.has-node }}
        run: npm run lint || true

  phpstan:
    name: PHPStan Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-scripts --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --error-format=github

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Setup Node
        if: ${{ inputs.has-node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install PHP dependencies
        run: composer install --no-scripts --prefer-dist

      - name: Install Node dependencies
        if: ${{ inputs.has-node }}
        run: npm ci

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Build assets
        if: ${{ inputs.has-node }}
        run: npm run build

      - name: Run tests
        run: ${{ inputs.test-runner }}

  # ── Release Please ─────────────────────────────────────
  # Multi-stage: runs on staging-branch (e.g. re7)
  # Solo stage:  runs on main-branch (e.g. master)
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: [security, quality, phpstan, tests]
    if: >-
      github.event_name == 'push' && (
        (inputs.staging-branch != '' && github.ref_name == inputs.staging-branch) ||
        (inputs.staging-branch == '' && github.ref_name == inputs.main-branch)
      )
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: ${{ inputs.release-type }}
          target-branch: ${{ inputs.staging-branch != '' && inputs.staging-branch || inputs.main-branch }}

  # ── Build and Deploy ───────────────────────────────────
  # Multi-stage:
  #   - staging-branch + release created → deploy staging
  #   - main-branch (merge from staging) → deploy prod
  # Solo stage:
  #   - main-branch + release created → deploy prod
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: [security, quality, phpstan, tests, release-please]
    if: >-
      always() && !failure() && !cancelled() &&
      github.event_name == 'push' && (
        (inputs.staging-branch != '' && github.ref_name == inputs.main-branch) ||
        (inputs.staging-branch != '' && github.ref_name == inputs.staging-branch && needs.release-please.outputs.release_created == 'true') ||
        (inputs.staging-branch == '' && github.ref_name == inputs.main-branch && needs.release-please.outputs.release_created == 'true')
      )
    permissions:
      contents: read
      packages: write
    environment: ${{ github.ref_name == inputs.main-branch && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: |
          if [ "${{ github.ref_name }}" = "${{ inputs.main-branch }}" ]; then
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PHP image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/php/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}-buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}-buildcache,mode=max

      - name: Build and push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.nginx-image }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.nginx-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          build-args: |
            PHP_IMAGE=ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.nginx-image }}:${{ env.IMAGE_TAG }}-buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.nginx-image }}:${{ env.IMAGE_TAG }}-buildcache,mode=max

      - name: Scan PHP image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          format: table

      - name: Prepare env file
        run: |
          echo '${{ secrets.ENV_FILE_BASE64 }}' | base64 -d > deploy/.env
          chmod 600 deploy/.env

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "deploy/*"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1
          overwrite: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            chmod +x deploy.sh
            IMAGE_TAG=${{ env.IMAGE_TAG }} ./deploy.sh

name: Laravel CI/CD

on:
  workflow_call:
    inputs:
      php-image:
        description: "PHP image name (e.g. sididev-php)"
        required: true
        type: string
      nginx-image:
        description: "Nginx image name (e.g. sididev-nginx)"
        required: true
        type: string
      php-version:
        description: "PHP version"
        default: "8.3"
        type: string
      node-version:
        description: "Node.js version"
        default: "20"
        type: string
      has-node:
        description: "Project uses Node.js (Inertia/Vite)"
        default: false
        type: boolean
      main-branch:
        description: "Main branch name"
        default: "master"
        type: string
      staging-branch:
        description: "Staging branch name (e.g. re7). Leave empty for solo stage"
        default: ""
        type: string
      has-release-please:
        description: "Enable release-please"
        default: false
        type: boolean
      release-type:
        description: "Release type for release-please (php, node, etc.)"
        default: "php"
        type: string
      test-runner:
        description: "Test runner command"
        default: "vendor/bin/pest"
        type: string
      runner:
        description: "Runner label (ubuntu-latest for cloud, self-hosted for kvm4)"
        default: "ubuntu-latest"
        # default: "self-hosted"   # toggle to use kvm4 (uncomment this, comment line above)
        type: string
    secrets:
      VPS_HOST:
        required: false
      VPS_USERNAME:
        required: false
      VPS_SSH_KEY:
        required: false
      VPS_PORT:
        required: false
      DEPLOY_PATH:
        required: false
      ENV_FILE_BASE64:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'master' && github.ref_name != 'main' }}

jobs:
  # ── Checks ─────────────────────────────────────────────
  security:
    name: Security Vulnerabilities
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Check vulnerabilities
        run: composer audit --locked

  quality:
    name: Code Quality
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Setup Node
        if: ${{ inputs.has-node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install PHP dependencies
        run: composer install --no-scripts --prefer-dist

      - name: Install Node dependencies
        if: ${{ inputs.has-node }}
        run: npm ci

      - name: Check PHP formatting
        run: vendor/bin/pint --test

      - name: Check frontend formatting
        if: ${{ inputs.has-node }}
        run: npm run format:check

      - name: Lint frontend
        if: ${{ inputs.has-node }}
        run: npm run lint

  phpstan:
    name: PHPStan Analysis
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-scripts --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --error-format=github

  tests:
    name: Tests
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Setup Node
        if: ${{ inputs.has-node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install PHP dependencies
        run: composer install --no-scripts --prefer-dist

      - name: Install Node dependencies
        if: ${{ inputs.has-node }}
        run: npm ci

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Build assets
        if: ${{ inputs.has-node }}
        run: npm run build

      - name: Run tests
        run: ${{ inputs.test-runner }}

  # ── Release Please ─────────────────────────────────────
  # Multi-stage: runs on staging-branch (e.g. re7)
  # Solo stage:  runs on main-branch (e.g. master)
  release-please:
    name: Release Please
    runs-on: ${{ inputs.runner }}
    needs: [security, quality, phpstan, tests]
    if: >-
      inputs.has-release-please &&
      github.event_name == 'push' && (
        (inputs.staging-branch != '' && github.ref_name == inputs.staging-branch) ||
        (inputs.staging-branch == '' && github.ref_name == inputs.main-branch)
      )
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          release-type: ${{ inputs.release-type }}
          target-branch: ${{ inputs.staging-branch != '' && inputs.staging-branch || inputs.main-branch }}

  # ── Build ───────────────────────────────────────────────
  build:
    name: Build
    runs-on: ${{ inputs.runner }}
    needs: [security, quality, phpstan, tests, release-please]
    if: >-
      always() && !failure() && !cancelled() &&
      github.event_name == 'push' && (
        (inputs.has-release-please == false && (
          github.ref_name == inputs.main-branch ||
          (inputs.staging-branch != '' && github.ref_name == inputs.staging-branch)
        )) ||
        (inputs.has-release-please && (
          (inputs.staging-branch != '' && github.ref_name == inputs.main-branch) ||
          (inputs.staging-branch != '' && github.ref_name == inputs.staging-branch && needs.release-please.outputs.release_created == 'true') ||
          (inputs.staging-branch == '' && github.ref_name == inputs.main-branch && needs.release-please.outputs.release_created == 'true')
        ))
      )
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set image tag
        run: |
          if [ "${{ github.ref_name }}" = "${{ inputs.main-branch }}" ]; then
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          fi

      - name: Lint PHP Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: docker/php/Dockerfile
          failure-threshold: error

      - name: Lint Nginx Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: docker/nginx/Dockerfile
          failure-threshold: error

      # Detect nginx-affecting changes. Safe to skip nginx rebuild because Vite assets
      # are now shared via the `app-build` runtime volume (decoupled from nginx image).
      # public/build/ is gitignored, so a public/** match never includes Vite output.
      - name: Detect nginx-affecting changes
        id: nginx-filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            nginx:
              - 'docker/nginx/**'
              - 'public/**'

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PHP image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./docker/php/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ inputs.php-image }}-${{ env.IMAGE_TAG }}
          cache-to: type=gha,scope=${{ inputs.php-image }}-${{ env.IMAGE_TAG }},mode=max

      - name: Build and push Nginx image
        if: steps.nginx-filter.outputs.nginx == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./docker/nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.nginx-image }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.nginx-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ inputs.nginx-image }}-${{ env.IMAGE_TAG }}
          cache-to: type=gha,scope=${{ inputs.nginx-image }}-${{ env.IMAGE_TAG }},mode=max

      - name: Retag existing Nginx image (no nginx-affecting changes)
        if: steps.nginx-filter.outputs.nginx != 'true'
        run: |
          docker buildx imagetools create \
            ghcr.io/${{ github.repository_owner }}/${{ inputs.nginx-image }}:${{ env.IMAGE_TAG }} \
            --tag ghcr.io/${{ github.repository_owner }}/${{ inputs.nginx-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}

      - name: Scan PHP image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          format: table

      - name: Scan Nginx image for vulnerabilities
        if: steps.nginx-filter.outputs.nginx == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ inputs.nginx-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          format: table

  # ── Deploy ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ${{ inputs.runner }}
    needs: [build]
    if: always() && needs.build.result == 'success'
    environment: ${{ github.ref_name == inputs.main-branch && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set image tag
        run: |
          if [ "${{ github.ref_name }}" = "${{ inputs.main-branch }}" ]; then
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          fi

      - name: Prepare env file
        run: |
          echo '${{ secrets.ENV_FILE_BASE64 }}' | base64 -d > deploy/.env
          chmod 600 deploy/.env

      - name: Setup SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy deployment files to VPS
        run: rsync -az --mkpath -e "ssh -p ${{ secrets.VPS_PORT }}" deploy/ ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Deploy to VPS
        run: ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "cd ${{ secrets.DEPLOY_PATH }} && chmod +x deploy.sh && IMAGE_TAG=${{ env.IMAGE_TAG }} ./deploy.sh"

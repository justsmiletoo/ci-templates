name: Sylius CI/CD

on:
  workflow_call:
    inputs:
      php-image:
        description: "PHP image name (e.g. greenhealthnature-php)"
        required: true
        type: string
      nginx-image:
        description: "Nginx image name (e.g. greenhealthnature-nginx)"
        required: true
        type: string
      php-version:
        description: "PHP version"
        default: "8.3"
        type: string
      main-branch:
        description: "Main branch name"
        default: "master"
        type: string
      staging-branch:
        description: "Staging branch name (e.g. re7). Leave empty for solo stage"
        default: ""
        type: string
      has-release-please:
        description: "Enable release-please"
        default: false
        type: boolean
      release-type:
        description: "Release type for release-please"
        default: "php"
        type: string
    secrets:
      VPS_HOST:
        required: false
      VPS_USERNAME:
        required: false
      VPS_SSH_KEY:
        required: false
      VPS_PORT:
        required: false
      DEPLOY_PATH:
        required: false
      ENV_FILE_BASE64:
        required: false

jobs:
  # ── Code Quality ─────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: ECS - Code Style
        run: vendor/bin/ecs check

  # ── PHPStan ──────────────────────────────────────────────
  phpstan:
    name: PHPStan Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse

  # ── Security Audit ───────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Check vulnerabilities
        run: |
          curl -sS https://get.symfony.com/cli/installer | bash
          mv ~/.symfony*/bin/symfony /usr/local/bin/symfony
          symfony security:check

  # ── Release Please ─────────────────────────────────────
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: [quality, phpstan, security]
    if: >-
      inputs.has-release-please &&
      github.event_name == 'push' && (
        (inputs.staging-branch != '' && github.ref_name == inputs.staging-branch) ||
        (inputs.staging-branch == '' && github.ref_name == inputs.main-branch)
      )
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: ${{ inputs.release-type }}
          target-branch: ${{ inputs.staging-branch != '' && inputs.staging-branch || inputs.main-branch }}

  # ── Build and Deploy ───────────────────────────────────
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: [quality, phpstan, security, release-please]
    if: >-
      always() && !failure() && !cancelled() &&
      github.event_name == 'push' && (
        (inputs.has-release-please == false && (
          github.ref_name == inputs.main-branch ||
          (inputs.staging-branch != '' && github.ref_name == inputs.staging-branch)
        )) ||
        (inputs.has-release-please && (
          (inputs.staging-branch != '' && github.ref_name == inputs.main-branch) ||
          (inputs.staging-branch != '' && github.ref_name == inputs.staging-branch && needs.release-please.outputs.release_created == 'true') ||
          (inputs.staging-branch == '' && github.ref_name == inputs.main-branch && needs.release-please.outputs.release_created == 'true')
        ))
      )
    permissions:
      contents: read
      packages: write
    environment: ${{ github.ref_name == inputs.main-branch && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: |
          if [ "${{ github.ref_name }}" = "${{ inputs.main-branch }}" ]; then
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PHP image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/php/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}-buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}-buildcache,mode=max

      - name: Build and push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.nginx-image }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.nginx-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          build-args: |
            PHP_IMAGE=ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.nginx-image }}:${{ env.IMAGE_TAG }}-buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.nginx-image }}:${{ env.IMAGE_TAG }}-buildcache,mode=max

      - name: Scan PHP image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          format: table

      - name: Prepare env file
        run: |
          echo '${{ secrets.ENV_FILE_BASE64 }}' | base64 -d > deploy/.env
          chmod 600 deploy/.env

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "deploy/*"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1
          overwrite: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            chmod +x deploy.sh
            IMAGE_TAG=${{ env.IMAGE_TAG }} ./deploy.sh

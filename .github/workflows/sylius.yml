name: Sylius CI/CD

on:
  workflow_call:
    inputs:
      php-image:
        description: "PHP image name (e.g. greenhealthnature-php)"
        required: true
        type: string
      nginx-image:
        description: "Nginx image name (e.g. greenhealthnature-nginx)"
        required: true
        type: string
      php-version:
        description: "PHP version"
        default: "8.3"
        type: string
      main-branch:
        description: "Main branch name"
        default: "master"
        type: string
      staging-branch:
        description: "Staging branch name (e.g. re7). Leave empty for solo stage"
        default: ""
        type: string
      has-release-please:
        description: "Enable release-please"
        default: false
        type: boolean
      release-type:
        description: "Release type for release-please"
        default: "php"
        type: string
      runner:
        description: "Runner label (ubuntu-latest for cloud, self-hosted for kvm4)"
        default: "ubuntu-latest"
        # default: "self-hosted"   # toggle to use kvm4 (uncomment this, comment line above)
        type: string
    secrets:
      VPS_HOST:
        required: false
      VPS_USERNAME:
        required: false
      VPS_SSH_KEY:
        required: false
      VPS_PORT:
        required: false
      DEPLOY_PATH:
        required: false
      ENV_FILE_BASE64:
        required: false

jobs:
  # ── Code Quality ─────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: ECS - Code Style
        run: vendor/bin/ecs check

  # ── PHPStan ──────────────────────────────────────────────
  phpstan:
    name: PHPStan Analysis
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse

  # ── Security Audit ───────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2

      - name: Check vulnerabilities
        run: |
          curl -sS https://get.symfony.com/cli/installer | bash
          mv ~/.symfony*/bin/symfony /usr/local/bin/symfony
          symfony security:check

  # ── Release Please ─────────────────────────────────────
  release-please:
    name: Release Please
    runs-on: ${{ inputs.runner }}
    needs: [quality, phpstan, security]
    if: >-
      inputs.has-release-please &&
      github.event_name == 'push' && (
        (inputs.staging-branch != '' && github.ref_name == inputs.staging-branch) ||
        (inputs.staging-branch == '' && github.ref_name == inputs.main-branch)
      )
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          release-type: ${{ inputs.release-type }}
          target-branch: ${{ inputs.staging-branch != '' && inputs.staging-branch || inputs.main-branch }}

  # ── Build ───────────────────────────────────────────────
  build:
    name: Build
    runs-on: ${{ inputs.runner }}
    needs: [quality, phpstan, security, release-please]
    if: >-
      always() && !failure() && !cancelled() &&
      github.event_name == 'push' && (
        (inputs.has-release-please == false && (
          github.ref_name == inputs.main-branch ||
          (inputs.staging-branch != '' && github.ref_name == inputs.staging-branch)
        )) ||
        (inputs.has-release-please && (
          (inputs.staging-branch != '' && github.ref_name == inputs.main-branch) ||
          (inputs.staging-branch != '' && github.ref_name == inputs.staging-branch && needs.release-please.outputs.release_created == 'true') ||
          (inputs.staging-branch == '' && github.ref_name == inputs.main-branch && needs.release-please.outputs.release_created == 'true')
        ))
      )
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set image tag
        run: |
          if [ "${{ github.ref_name }}" = "${{ inputs.main-branch }}" ]; then
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PHP image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./docker/php/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ inputs.php-image }}-${{ env.IMAGE_TAG }}
          cache-to: type=gha,scope=${{ inputs.php-image }}-${{ env.IMAGE_TAG }},mode=max

      - name: Build and push Nginx image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./docker/nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.nginx-image }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.nginx-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          build-args: |
            PHP_IMAGE=ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          cache-from: type=gha,scope=${{ inputs.nginx-image }}-${{ env.IMAGE_TAG }}
          cache-to: type=gha,scope=${{ inputs.nginx-image }}-${{ env.IMAGE_TAG }},mode=max

      - name: Scan PHP image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ inputs.php-image }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          format: table

  # ── Deploy ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ${{ inputs.runner }}
    needs: [build]
    if: always() && needs.build.result == 'success'
    environment: ${{ github.ref_name == inputs.main-branch && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set image tag
        run: |
          if [ "${{ github.ref_name }}" = "${{ inputs.main-branch }}" ]; then
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          fi

      - name: Prepare env file
        run: |
          echo '${{ secrets.ENV_FILE_BASE64 }}' | base64 -d > deploy/.env
          chmod 600 deploy/.env

      - name: Setup SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy deployment files to VPS
        run: rsync -az --mkpath -e "ssh -p ${{ secrets.VPS_PORT }}" deploy/ ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Deploy to VPS
        run: ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "cd ${{ secrets.DEPLOY_PATH }} && chmod +x deploy.sh && IMAGE_TAG=${{ env.IMAGE_TAG }} ./deploy.sh"

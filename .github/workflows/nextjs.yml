name: Next.js CI/CD

on:
  workflow_call:
    inputs:
      image-name:
        description: "Docker image name (e.g. school-management-front)"
        required: true
        type: string
      node-version:
        description: "Node.js version"
        default: "20"
        type: string
      package-manager:
        description: "Package manager (pnpm, npm or bun)"
        default: "pnpm"
        type: string
      prepare-command:
        description: "Command to run before lint (e.g. pnpm run prepare for Panda CSS)"
        default: ""
        type: string
      main-branch:
        description: "Main branch name"
        default: "master"
        type: string
      staging-branch:
        description: "Staging branch name (e.g. re7). Leave empty for solo stage"
        default: ""
        type: string
      has-release-please:
        description: "Enable release-please (for solo apps, not fullstack fronts)"
        default: false
        type: boolean
      release-type:
        description: "Release type for release-please"
        default: "node"
        type: string
    secrets:
      VPS_HOST:
        required: false
      VPS_USERNAME:
        required: false
      VPS_SSH_KEY:
        required: false
      VPS_PORT:
        required: false
      DEPLOY_PATH:
        required: false
      ENV_FILE_BASE64:
        required: false

jobs:
  # ── Lint ─────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ inputs.package-manager != 'bun' }}
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup pnpm
        if: ${{ inputs.package-manager == 'pnpm' }}
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 9

      - name: Setup bun
        if: ${{ inputs.package-manager == 'bun' }}
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          elif [ "${{ inputs.package-manager }}" = "bun" ]; then
            bun install --frozen-lockfile
          else
            npm ci
          fi

      - name: Prepare
        if: ${{ inputs.prepare-command != '' }}
        run: ${{ inputs.prepare-command }}

      - name: Lint
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm run lint
          elif [ "${{ inputs.package-manager }}" = "bun" ]; then
            bun run lint
          else
            npm run lint
          fi

  # ── Type Check ───────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ inputs.package-manager != 'bun' }}
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup pnpm
        if: ${{ inputs.package-manager == 'pnpm' }}
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 9

      - name: Setup bun
        if: ${{ inputs.package-manager == 'bun' }}
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          elif [ "${{ inputs.package-manager }}" = "bun" ]; then
            bun install --frozen-lockfile
          else
            npm ci
          fi

      - name: Prepare
        if: ${{ inputs.prepare-command != '' }}
        run: ${{ inputs.prepare-command }}

      - name: Type Check
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm run check
          elif [ "${{ inputs.package-manager }}" = "bun" ]; then
            bun run check
          else
            npm run check
          fi

  # ── Security Audit ───────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ inputs.package-manager != 'bun' }}
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup pnpm
        if: ${{ inputs.package-manager == 'pnpm' }}
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 9

      - name: Setup bun
        if: ${{ inputs.package-manager == 'bun' }}
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          elif [ "${{ inputs.package-manager }}" = "bun" ]; then
            bun install --frozen-lockfile
          else
            npm ci
          fi

      - name: Security Audit
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm audit --prod || true
          elif [ "${{ inputs.package-manager }}" = "bun" ]; then
            bun pm pack --dry-run 2>/dev/null || true
          else
            npm audit --prod || true
          fi

  # ── Release Please (solo apps only) ────────────────────
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: [lint, type-check, audit]
    if: >-
      inputs.has-release-please &&
      github.event_name == 'push' && (
        (inputs.staging-branch != '' && github.ref_name == inputs.staging-branch) ||
        (inputs.staging-branch == '' && github.ref_name == inputs.main-branch)
      )
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          release-type: ${{ inputs.release-type }}
          target-branch: ${{ inputs.staging-branch != '' && inputs.staging-branch || inputs.main-branch }}

  # ── Build ───────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, audit, release-please]
    if: >-
      always() && !failure() && !cancelled() &&
      github.event_name == 'push' && (
        (inputs.has-release-please == false && (
          github.ref_name == inputs.main-branch ||
          (inputs.staging-branch != '' && github.ref_name == inputs.staging-branch)
        )) ||
        (inputs.has-release-please && (
          (inputs.staging-branch != '' && github.ref_name == inputs.main-branch) ||
          (inputs.staging-branch != '' && github.ref_name == inputs.staging-branch && needs.release-please.outputs.release_created == 'true') ||
          (inputs.staging-branch == '' && github.ref_name == inputs.main-branch && needs.release-please.outputs.release_created == 'true')
        ))
      )
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set image tag
        run: |
          if [ "${{ github.ref_name }}" = "${{ inputs.main-branch }}" ]; then
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          fi

      - name: Extract NEXT_PUBLIC vars from env secret
        run: |
          echo '${{ secrets.ENV_FILE_BASE64 }}' | base64 -d > /tmp/.env
          while IFS= read -r line; do
            if [[ "$line" =~ ^NEXT_PUBLIC_ ]]; then
              echo "$line" >> $GITHUB_ENV
            fi
          done < /tmp/.env
          rm /tmp/.env

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha,scope=${{ inputs.image-name }}-${{ env.IMAGE_TAG }}
          cache-to: type=gha,scope=${{ inputs.image-name }}-${{ env.IMAGE_TAG }},mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          format: table

  # ── Deploy ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && needs.build.result == 'success'
    environment: ${{ github.ref_name == inputs.main-branch && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set image tag
        run: |
          if [ "${{ github.ref_name }}" = "${{ inputs.main-branch }}" ]; then
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          fi

      - name: Prepare env file
        run: |
          echo '${{ secrets.ENV_FILE_BASE64 }}' | base64 -d > deploy/.env
          chmod 600 deploy/.env

      - name: Setup SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy deployment files to VPS
        run: rsync -az --mkpath -e "ssh -p ${{ secrets.VPS_PORT }}" deploy/ ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Deploy to VPS
        run: ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "cd ${{ secrets.DEPLOY_PATH }} && chmod +x deploy.sh && IMAGE_TAG=${{ env.IMAGE_TAG }} ./deploy.sh"
